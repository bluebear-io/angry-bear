version: 2

project_name: angry-bear

builds:
  - id: angry-bear
    main: ./cmd/angry-bear/
    binary: angry-bear
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version=v{{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"

brews:
  - name: angry-bear
    repository:
      owner: Blue-Bear-Security
      name: homebrew-angry-bear
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    url_template: "https://github.com/Blue-Bear-Security/homebrew-angry-bear/releases/download/v{{ .Version }}/{{ .ArtifactName }}"
    homepage: https://github.com/Blue-Bear-Security/angry-bear
    description: "Enforce skill-loading requirements for AI coding agents"
    license: "Apache-2.0"
    install: |
      bin.install "angry-bear"
    test: |
      system "#{bin}/angry-bear", "version"

release:
  github:
    owner: Blue-Bear-Security
    name: angry-bear
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"

snapshot:
  version_template: "{{ .Tag }}-next"
