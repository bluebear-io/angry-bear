version: 2

project_name: care-bare

builds:
  - id: care-bare
    main: ./cmd/care-bare/
    binary: care-bare
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "^style:"
      - "^refactor:"

release:
  github:
    owner: Blue-Bear-Security
    name: care-bare
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"

snapshot:
  version_template: "{{ .Tag }}-next"
