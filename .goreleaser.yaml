version: 2

project_name: angry-bear

builds:
  - id: angry-bear
    main: ./cmd/angry-bear/
    binary: angry-bear
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version=v{{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"

homebrew_casks:
  - name: angry-bear
    repository:
      owner: bluebear-io
      name: homebrew-angry-bear
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    url:
      template: "https://github.com/bluebear-io/homebrew-angry-bear/releases/download/v{{ .Version }}/{{ .ArtifactName }}"
    homepage: https://github.com/bluebear-io/angry-bear
    description: "Enforce skill-loading requirements for AI coding agents"
    binaries: [angry-bear]
    # angry-bear ships unsigned binaries; strip the quarantine flag Homebrew
    # sets on cask downloads so macOS Gatekeeper doesn't block execution.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/angry-bear"]
          end

release:
  github:
    owner: bluebear-io
    name: angry-bear
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"

snapshot:
  version_template: "{{ .Tag }}-next"
